<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlocaQoL - Créer un compte</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8e8e8;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .subtitle {
      color: #a0a0a0;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.35rem;
      color: #b0b0b0;
    }
    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 1rem;
    }
    input::placeholder { color: #666; }
    input:focus {
      outline: none;
      border-color: #4a9eff;
      box-shadow: 0 0 0 2px rgba(74,158,255,0.2);
    }
    button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4a9eff, #357abd);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.95; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .message {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: center;
    }
    .message.success { background: rgba(74,222,128,0.2); color: #4ade80; }
    .message.error { background: rgba(248,113,113,0.2); color: #f87171; }
    .message.hidden { display: none; }
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>BlocaQoL</h1>
    <p class="subtitle">Créer un compte pour le mod Minecraft</p>

    <form id="registerForm">
      <label for="username">Nom d'utilisateur (3+ caractères)</label>
      <input type="text" id="username" name="username" placeholder="Ex: Steve" minlength="3" maxlength="64" required autocomplete="username">

      <label for="password">Mot de passe (6+ caractères)</label>
      <input type="password" id="password" name="password" placeholder="••••••••" minlength="6" required autocomplete="new-password">

      <button type="submit" id="submitBtn">Créer mon compte</button>
    </form>

    <div id="message" class="message hidden"></div>
    <p class="footer">Utilise ces identifiants dans le mod (touche B)</p>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, isError) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + (isError ? 'error' : 'success');
      messageEl.classList.remove('hidden');
    }

    function hideMessage() {
      messageEl.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (username.length < 3) {
        showMessage('Le nom d\'utilisateur doit faire au moins 3 caractères.', true);
        return;
      }
      if (password.length < 6) {
        showMessage('Le mot de passe doit faire au moins 6 caractères.', true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Création...';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showMessage('✓ Compte créé ! Tu peux te connecter dans le mod.', false);
          form.reset();
        } else {
          showMessage(data.error || 'Erreur lors de la création', true);
        }
      } catch (err) {
        showMessage('Erreur de connexion au serveur.', true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Créer mon compte';
      }
    });
  </script>
</body>
</html>
