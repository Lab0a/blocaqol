<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlocaQoL - Créer un compte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(160deg, #0c0c14 0%, #1a1a2e 40%, #0d1b2a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8e8e8;
      padding: 2rem;
    }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.85rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-top: 0.35rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.45rem;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #475569; }
    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.25);
    }
    button {
      width: 100%;
      padding: 1rem;
      margin-top: 1.5rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99,102,241,0.4);
    }
    button:active { transform: translateY(0); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      margin-top: 1.25rem;
      padding: 0.85rem;
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: center;
    }
    .message.success {
      background: rgba(34,197,94,0.2);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.3);
    }
    .message.error {
      background: rgba(239,68,68,0.2);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .message.hidden { display: none; }
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: #475569;
    }
    .footer a { color: #6366f1; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>BlocaQoL</h1>
      <p class="subtitle">Créer un compte pour le mod Minecraft</p>
    </div>

    <form id="registerForm">
      <label for="code">Code d'inscription</label>
      <input type="text" id="code" name="code" placeholder="Ex: ABC12345" maxlength="8" required autocomplete="off" style="letter-spacing: 0.15em; text-transform: uppercase;">

      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" name="username" placeholder="Ex: Steve" minlength="3" maxlength="64" required autocomplete="username">

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="••••••••" minlength="6" required autocomplete="new-password">

      <button type="submit" id="submitBtn">Créer mon compte</button>
    </form>

    <div id="message" class="message hidden"></div>
    <p class="footer">
      Demande un code à l'admin pour t'inscrire.<br>
      Utilise ces identifiants dans le mod (touche B).
    </p>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const codeInput = document.getElementById('code');

    codeInput.addEventListener('input', function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    function showMessage(text, isError) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + (isError ? 'error' : 'success');
      messageEl.classList.remove('hidden');
    }
    function hideMessage() { messageEl.classList.add('hidden'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const code = codeInput.value.trim().toUpperCase();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (code.length < 6) {
        showMessage('Code d\'inscription invalide.', true);
        return;
      }
      if (username.length < 3) {
        showMessage('Le nom d\'utilisateur doit faire au moins 3 caractères.', true);
        return;
      }
      if (password.length < 6) {
        showMessage('Le mot de passe doit faire au moins 6 caractères.', true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Création...';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, code })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showMessage('✓ Compte créé ! Tu peux te connecter dans le mod.', false);
          form.reset();
        } else {
          showMessage(data.error || 'Erreur lors de la création', true);
        }
      } catch (err) {
        showMessage('Erreur de connexion au serveur.', true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Créer mon compte';
      }
    });
  </script>
</body>
</html>
